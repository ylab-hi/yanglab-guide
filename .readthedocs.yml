version: 2
build:
  os: ubuntu-22.04
  tools:
    python: "3.9"
  jobs:
    pre_install:
      - pip install uv
    # Install the project's dependencies into Read the Docs' own virtualenv
    # (the one that runs sphinx-build), not a separate uv-managed .venv.
    post_install:
      - uv pip install --python "${READTHEDOCS_VIRTUALENV_PATH}/bin/python" -r pyproject.toml
sphinx:
  configuration: source/conf.py
formats: all
